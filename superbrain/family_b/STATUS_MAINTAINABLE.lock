OPERATIONAL SEMANTICS (Executable)
================================================================================

SELF-DIAGNOSING
  System can classify its own failures:
    - Type 1: Critical (needs immediate fallback)
    - Type 2: High (needs route adjustment)
    - Type 3: Monitor (elevated watch)

SELF-HEALING
  Automatic responses:
    - Tier 1: Auto-fallback, no human needed
    - Tier 2: Auto-suggest route adjustments
    - Tier 3: Auto-escalate monitoring

MAINTAINABLE
  Clear operational guidelines:
    - When to fallback (completion < 0.85)
    - When to adjust (pressure=3 or 3-contract)
    - When to monitor (completion 0.85-0.90)

