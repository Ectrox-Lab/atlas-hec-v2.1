MAINTENANCE PROTOCOLS (Locked)
================================================================================

SCHEDULED MAINTENANCE
  Weekly:
    - Review Tier 1 fallback logs
    - Check Tier 2 route adjust frequency
    - Verify alert threshold compliance
  
  Monthly:
    - Analyze failure archetype patterns
    - Tune thresholds if FP rate > 10%
    - Review pressure distribution

ALERT THRESHOLDS
  CRITICAL: >1% Tier 1 events per batch
  HIGH: >5% Tier 2 events per batch  
  NORMAL: <5% Tier 3 warnings per batch
  HEALTHY: Zero Tier 1/2, minimal Tier 3

TUNING GUIDELINES
  - completion threshold: 0.85 (locked unless data shows otherwise)
  - pressure preference: P2 over P3
  - contract count: 2 preferred, 3 diagnostic only

