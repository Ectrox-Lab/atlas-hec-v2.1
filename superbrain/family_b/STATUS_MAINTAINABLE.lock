================================================================================
TIERED PRODUCTION RUNBOOK (LOCKED)
================================================================================

PRIMARY CONFIGURATION (Default)
  Contracts: StrictHandoff + AdaptiveRecovery
  Pressure: P2 (default)
  Success Rate: 100%
  Usage: DEFAULT for all Task-2 operations

FALLBACK CONFIGURATION (Auto-trigger)
  Contracts: StrictHandoff + PressureThrottle
  Success Rate: 100%
  Usage: Automatic on Tier 1 trigger

TIER 1 TRIGGER — CRITICAL (Immediate Action)
  Condition: pipeline_completion < 0.85
  Action: IMMEDIATE FALLBACK to SH+PT
  Priority: P0 - Interrupt current operation
  Log: CRITICAL_FALLBACK_EVENT
  Response Time: < 100ms
  
TIER 2 TRIGGER — HIGH (Route Adjust)
  Condition: pressure = 3 OR 3-contract combo detected
  Action: REDUCE complexity
    - Option A: Switch to 2-contract combo
    - Option B: Reduce pressure from P3 to P2
  Priority: P1 - Schedule adjustment
  Log: ROUTE_ADJUST_EVENT
  Response Time: < 1s
  
TIER 3 TRIGGER — MONITOR (Watch)
  Condition: 0.85 <= completion < 0.90
  Action: INCREASE monitoring frequency
    - Log detailed metrics
    - Prepare fallback readiness
    - Alert operator
  Priority: P2 - Elevated watch
  Log: BOUNDARY_WARNING_EVENT
  Response Time: Logging only

================================================================================
FAILURE ARCHETYPE TYPES (Documented)
================================================================================

CRITICAL COMPLETION DROP (Tier 1)
  Frequency: 12.5% of AR failures
  Condition: completion < 0.85
  Example: P3M3 configs under stress
  Action: Immediate fallback

MODERATE COMPLETION DROP (Tier 3)
  Frequency: 62.5% of AR failures
  Condition: 0.85 <= completion < 0.90
  Context: Usually P3 pressure
  Action: Monitor + prepare fallback

HIGH PRESSURE FRAGILITY (Tier 2)
  Frequency: 62.5% of AR failures
  Condition: pressure = 3
  Context: AR satisfaction drops
  Action: Reduce pressure or contract count

MULTI-CONTRACT STRESS (Tier 2)
  Frequency: 75% of AR failures
  Condition: 3-contract combinations
  Context: Full-stack fragility
  Action: Reduce to 2-contract baseline

