TASK-2 PRODUCTION DEFAULTS (LOCKED)
================================================================================

P2 PRESSURE (Normal Operation)
  Primary:   StrictHandoff + AdaptiveRecovery
  Fallback:  StrictHandoff + PressureThrottle
  Trigger:   completion < 0.85 (Tier 1)

P3 PRESSURE (High Stress)
  Primary:   StrictHandoff + PressureThrottle
  
  Switchback to SH+AR (OPTIMIZED v4.1.1):
    Condition: completion >= 0.90
    Process:
      1. ALLOW switchback attempt
      2. MONITOR for 1 round
      3. CONFIRM if completion stable
      4. ROLLBACK to SH+PT if AR fails
    
    Deferred Switchback:
      Condition: completion < 0.90
      Action: STAY on SH+PT
      Log: "Switchback deferred: completion below threshold"

BIDIRECTIONAL FALLBACK CHAIN:
  P2 Path: SH+AR → SH+PT (completion < 0.85)
  P3 Path: SH+PT → SH+AR (completion >= 0.90 + monitor)

