================================================================================
PRESSURE-AWARE POLICY (LOCKED)
================================================================================

P2 PRESSURE (Normal Operation)
  Primary:   StrictHandoff + AdaptiveRecovery
  Fallback:  StrictHandoff + PressureThrottle
  Rationale: AR optimal at normal pressure
  
P3 PRESSURE (High Stress)
  Primary:   StrictHandoff + PressureThrottle
  Fallback:  StrictHandoff + AdaptiveRecovery
  Rationale: PT more robust at high pressure
  
BIDIRECTIONAL FALLBACK CHAIN
  P2 Path: SH+AR → SH+PT (if AR fails)
  P3 Path: SH+PT → SH+AR (if PT insufficient)
  
  No dead ends. Both contracts serve as primary/fallback depending on pressure.

================================================================================
TIERED TRIGGERS (v4.1 Enhanced)
================================================================================

TIER 1 — CRITICAL (Immediate Fallback)
  Condition: completion < 0.85
  Action: FALLBACK to pressure-appropriate config
    - P2: Switch to SH+PT
    - P3: Switch to SH+AR
  Log: CRITICAL_FALLBACK_EVENT

TIER 2 — HIGH (Route Adjust)
  Condition: completion 0.85-0.90 AND pressure mismatch detected
  Action: PROACTIVE SWITCH to pressure-optimal config
    - P3 detected: Preemptively use SH+PT
  Note: v4.1 proactively prevents most Tier 2 events at P3
  Log: PROACTIVE_ADJUST_EVENT

TIER 3 — MONITOR (Watch)
  Condition: completion 0.85-0.90
  Action: Increase monitoring
  Log: BOUNDARY_WARNING_EVENT

